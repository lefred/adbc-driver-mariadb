name: mariadb
services:
  test-service:
    image: mariadb:12.2
    environment:
      MARIADB_ROOT_PASSWORD: "password"
      MARIADB_DATABASE: db
      MARIADB_USER: my
      MARIADB_PASSWORD: password
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - 3306:3306
